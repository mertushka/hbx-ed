name: Feature request
description: Suggest an improvement for HBX-ED.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like HBX-ED to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of HBX-ED does this affect most?
      options:
        - Canvas editor
        - Properties panel
        - Object tree
        - File import/export
        - Validation
        - Testing/developer workflow
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Add screenshots, links, or examples from other editors if useful.
    validations:
      required: false
